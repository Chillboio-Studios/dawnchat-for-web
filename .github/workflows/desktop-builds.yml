name: Desktop Builds

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Stable release tag to publish (for example: v1.0.0)"
        required: false
        type: string
  push:
    branches:
      - "**"

concurrency:
  group: desktop-builds-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  FLATPAK_OTA_BASE_URL: https://flatpak-ota.chillboiostudios.com
  FLATPAK_OTA_REPOSITORY: Chillboio-Studios/flatpak-ota
  FLATPAK_OTA_APP_PATH: apps/dawnchat
  APP_API_URL: https://app.dawn-chat.com/api
  APP_CLIENT_API_URL: https://app.dawn-chat.com/client-api
  VITE_SENTRY_DSN: https://82ee7c93f5675dc1c4bbb122807eea64@o4508026382712832.ingest.us.sentry.io/4511091575095296
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/client/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/client/src-tauri -> target

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build dependencies
        shell: pwsh
        run: |
          pnpm --filter stoat.js build
          pnpm --filter solid-livekit-components build
          pnpm --filter @lingui-solid/babel-plugin-lingui-macro build
          pnpm --filter @lingui-solid/babel-plugin-extract-messages build
          pnpm --filter client exec lingui compile --typescript

      - name: Ensure Windows icon exists
        shell: pwsh
        run: |
          $iconPath = "packages/client/src-tauri/icons/icon.ico"
          if (!(Test-Path $iconPath)) {
            New-Item -ItemType Directory -Force -Path "packages/client/src-tauri/icons" | Out-Null
            Copy-Item "packages/client/assets/web/icon.ico" $iconPath -Force
          }

      - name: Build desktop app (Windows)
        shell: pwsh
        run: pnpm build-windows

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: packages/client/src-tauri/target/release/bundle/
          if-no-files-found: error

  flatpak:
    name: Flatpak (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-latest
          - arch: aarch64
            runs_on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            flatpak \
            flatpak-builder \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak runtime and SDK
        run: |
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/client/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/client/src-tauri -> target

      - name: Restore Flatpak builder cache
        uses: actions/cache@v4
        with:
          path: |
            .flatpak-builder/cache
            .flatpak-builder/downloads
          key: ${{ runner.os }}-flatpak-builder-${{ matrix.arch }}-${{ hashFiles('packaging/flatpak/com.chillboiostudios.dawnchat.yml', 'packages/client/src-tauri/tauri.conf.json', 'pnpm-lock.yaml', 'packages/client/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flatpak-builder-${{ matrix.arch }}-

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm install --frozen-lockfile --prefer-offline

      - name: Build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm --filter stoat.js build
          pnpm --filter solid-livekit-components build
          pnpm --filter @lingui-solid/babel-plugin-lingui-macro build
          pnpm --filter @lingui-solid/babel-plugin-extract-messages build
          pnpm --filter client exec lingui compile --typescript

      - name: Build desktop binary for Flatpak
        shell: bash
        run: |
          set -euxo pipefail
          OTUBE_LINUX_FLAVOR=flatpak-${{ matrix.arch }} pnpm --filter client exec node ./scripts/build-desktop.mjs linux-nobundle

      - name: Build Flatpak bundle
        shell: bash
        run: |
          set -euxo pipefail
          flatpak-builder --arch=${{ matrix.arch }} --default-branch=stable --force-clean --repo=repo flatpak-build-dir packaging/flatpak/com.chillboiostudios.dawnchat.yml
          flatpak build-update-repo --prune repo
          flatpak build-bundle --arch=${{ matrix.arch }} --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo repo DawnChat-${{ matrix.arch }}.flatpak com.chillboiostudios.dawnchat stable

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: desktop-flatpak-${{ matrix.arch }}
          path: DawnChat-${{ matrix.arch }}.flatpak
          if-no-files-found: error

      - name: Upload Flatpak OSTree repo
        uses: actions/upload-artifact@v4
        with:
          name: desktop-flatpak-repo-${{ matrix.arch }}
          path: repo/
          if-no-files-found: error

  publish-flatpak-remote:
    name: Publish Flatpak Remote
    runs-on: ubuntu-latest
    needs:
      - flatpak

    steps:
      - name: Install publishing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak ostree

      - name: Download Flatpak repo artifacts
        uses: actions/download-artifact@v5
        with:
          path: flatpak-repos
          pattern: desktop-flatpak-repo-*
          merge-multiple: false

      - name: Compute OTA version tag
        id: ota_meta
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            input_tag="${{ github.event.inputs.release_tag }}"
            if [ -n "${input_tag}" ]; then
              version_tag="${input_tag}"
            else
              version_tag="v${{ github.run_number }}"
            fi
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            version_tag="${{ github.ref_name }}"
          else
            version_tag="beta-${{ github.run_number }}-${{ github.sha }}"
          fi
          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Merge architecture repos and create remote metadata
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p "public/${FLATPAK_OTA_APP_PATH}/repo"
          ostree --repo="public/${FLATPAK_OTA_APP_PATH}/repo" init --mode=archive-z2

          while IFS= read -r repo_dir; do
            ostree --repo="public/${FLATPAK_OTA_APP_PATH}/repo" pull-local "${repo_dir}"
          done < <(find flatpak-repos -mindepth 2 -maxdepth 2 -type d -name repo | sort)

          flatpak build-update-repo --generate-static-deltas --prune "public/${FLATPAK_OTA_APP_PATH}/repo"

          REPO_URL="${FLATPAK_OTA_BASE_URL}/${FLATPAK_OTA_APP_PATH}/repo/"
          HOMEPAGE_URL="https://github.com/Chillboio-Studios/otube-for-web"
          ICON_URL="${FLATPAK_OTA_BASE_URL}/apps/dawnchat/icon.png"
          GPG_KEY_BASE64="${{ secrets.FLATPAK_REPO_GPG_KEY_BASE64 }}"

          mkdir -p "public/${FLATPAK_OTA_APP_PATH}"

          cat > "public/${FLATPAK_OTA_APP_PATH}/com.chillboiostudios.dawnchat.flatpakref" <<EOF
          [Flatpak Ref]
          Name=app/com.chillboiostudios.dawnchat/x86_64/stable
          Branch=stable
          Title=DawnChat
          IsRuntime=false
          Url=${REPO_URL}
          RuntimeRepo=https://flathub.org/repo/flathub.flatpakrepo
          SuggestRemoteName=dawnchat
          Homepage=${HOMEPAGE_URL}
          Icon=${ICON_URL}
          EOF

          if [ -n "${GPG_KEY_BASE64}" ]; then
            echo "GPGKey=${GPG_KEY_BASE64}" >> "public/${FLATPAK_OTA_APP_PATH}/com.chillboiostudios.dawnchat.flatpakref"
            echo "NoGPGVerify=false" >> "public/${FLATPAK_OTA_APP_PATH}/com.chillboiostudios.dawnchat.flatpakref"
          else
            echo "NoGPGVerify=true" >> "public/${FLATPAK_OTA_APP_PATH}/com.chillboiostudios.dawnchat.flatpakref"
          fi

          cat > "public/${FLATPAK_OTA_APP_PATH}/com.chillboiostudios.dawnchat.aarch64.flatpakref" <<EOF
          [Flatpak Ref]
          Name=app/com.chillboiostudios.dawnchat/aarch64/stable
          Branch=stable
          Title=DawnChat
          IsRuntime=false
          Url=${REPO_URL}
          RuntimeRepo=https://flathub.org/repo/flathub.flatpakrepo
          SuggestRemoteName=dawnchat
          Homepage=${HOMEPAGE_URL}
          Icon=${ICON_URL}
          EOF

          if [ -n "${GPG_KEY_BASE64}" ]; then
            echo "GPGKey=${GPG_KEY_BASE64}" >> "public/${FLATPAK_OTA_APP_PATH}/com.chillboiostudios.dawnchat.aarch64.flatpakref"
            echo "NoGPGVerify=false" >> "public/${FLATPAK_OTA_APP_PATH}/com.chillboiostudios.dawnchat.aarch64.flatpakref"
          else
            echo "NoGPGVerify=true" >> "public/${FLATPAK_OTA_APP_PATH}/com.chillboiostudios.dawnchat.aarch64.flatpakref"
          fi

      - name: Upload Flatpak remote artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-flatpak-remote
          path: public/${{ env.FLATPAK_OTA_APP_PATH }}/
          if-no-files-found: error

      - name: Publish Flatpak OTA to external repository
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref_name == github.event.repository.default_branch || github.ref_name == 'master'
        shell: bash
        env:
          OTA_REPO_TOKEN: ${{ secrets.FLATPAK_OTA_REPO_TOKEN }}
          OTA_VERSION_TAG: ${{ steps.ota_meta.outputs.version_tag }}
        run: |
          set -euxo pipefail

          if [ -z "${OTA_REPO_TOKEN}" ]; then
            echo "FLATPAK_OTA_REPO_TOKEN is required to publish OTA content."
            exit 1
          fi

          git clone --depth=1 "https://x-access-token:${OTA_REPO_TOKEN}@github.com/${FLATPAK_OTA_REPOSITORY}.git" ota-repo
          cd ota-repo

          target_branch=""
          if git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            target_branch="main"
          elif git ls-remote --exit-code --heads origin master >/dev/null 2>&1; then
            target_branch="master"
          fi

          if [ -n "${target_branch}" ]; then
            git fetch origin "${target_branch}"
            git checkout -B "${target_branch}" FETCH_HEAD
          else
            target_branch="main"
            git checkout --orphan "${target_branch}"
            git rm -rf . || true
          fi

          mkdir -p "${FLATPAK_OTA_APP_PATH}"
          rsync -a --delete "../public/${FLATPAK_OTA_APP_PATH}/" "${FLATPAK_OTA_APP_PATH}/"

          if [ ! -f CNAME ]; then
            echo "flatpak-ota.chillboiostudios.com" > CNAME
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${FLATPAK_OTA_APP_PATH}" CNAME

          if git diff --cached --quiet; then
            echo "No OTA content changes to publish."
            exit 0
          fi

          git commit -m "dawnchat ota ${OTA_VERSION_TAG}"

          tag_name="dawnchat-${OTA_VERSION_TAG}"
          git tag -f "${tag_name}"

          git push origin "${target_branch}"
          git push origin "${tag_name}" --force

      - name: Trigger OTA repository metadata rebuild
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref_name == github.event.repository.default_branch || github.ref_name == 'master'
        shell: bash
        env:
          OTA_REPO_TOKEN: ${{ secrets.FLATPAK_OTA_REPO_TOKEN }}
        run: |
          set -euxo pipefail

          if [ -z "${OTA_REPO_TOKEN}" ]; then
            echo "FLATPAK_OTA_REPO_TOKEN is required to trigger OTA metadata rebuild."
            exit 1
          fi

          dispatch_ref="main"
          if ! curl -fsSL -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${OTA_REPO_TOKEN}" \
            "https://api.github.com/repos/${FLATPAK_OTA_REPOSITORY}/branches/main" >/dev/null 2>&1; then
            dispatch_ref="master"
          fi

          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${OTA_REPO_TOKEN}" \
            "https://api.github.com/repos/${FLATPAK_OTA_REPOSITORY}/actions/workflows/build-main-remote.yml/dispatches" \
            -d "{\"ref\":\"${dispatch_ref}\"}"

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - flatpak
      - publish-flatpak-remote

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Compute release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=beta-${{ github.run_number }}-${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "name=DawnChat Beta ${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            input_tag="${{ github.event.inputs.release_tag }}"
            if [ -z "$input_tag" ]; then
              input_tag="v${{ github.run_number }}"
            fi
            echo "tag=$input_tag" >> "$GITHUB_OUTPUT"
            echo "name=DawnChat $input_tag" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-assets/**/DawnChat*.exe
            release-assets/**/DawnChat*.msi
            release-assets/**/DawnChat*.flatpak
            release-assets/**/com.chillboiostudios.dawnchat.flatpakref
            release-assets/**/com.chillboiostudios.dawnchat.aarch64.flatpakref
