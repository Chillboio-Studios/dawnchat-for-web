name: Desktop Builds

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Stable release tag to publish (for example: v1.0.0)"
        required: false
        type: string
  push:
    branches:
      - "**"

concurrency:
  group: desktop-builds-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  FLATPAK_OTA_BASE_URL: https://flatpak-ota.chillboiostudios.com
  FLATPAK_OTA_REPOSITORY: Chillboio-Studios/flatpak-ota
  FLATPAK_OTA_APP_PATH: apps/dawnchat
  APP_API_URL: https://app.dawn-chat.com/api
  APP_CLIENT_API_URL: https://app.dawn-chat.com/client-api
  VITE_SENTRY_DSN: https://82ee7c93f5675dc1c4bbb122807eea64@o4508026382712832.ingest.us.sentry.io/4511091575095296
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/client/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/client/src-tauri -> target

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build dependencies
        shell: pwsh
        run: |
          pnpm --filter stoat.js build
          pnpm --filter solid-livekit-components build
          pnpm --filter @lingui-solid/babel-plugin-lingui-macro build
          pnpm --filter @lingui-solid/babel-plugin-extract-messages build
          pnpm --filter client exec lingui compile --typescript

      - name: Ensure Windows icon exists
        shell: pwsh
        run: |
          $iconPath = "packages/client/src-tauri/icons/icon.ico"
          if (!(Test-Path $iconPath)) {
            New-Item -ItemType Directory -Force -Path "packages/client/src-tauri/icons" | Out-Null
            Copy-Item "packages/client/assets/web/icon.ico" $iconPath -Force
          }

      - name: Build desktop app (Windows)
        shell: pwsh
        run: pnpm build-windows

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: packages/client/src-tauri/target/release/bundle/
          if-no-files-found: error

  linux-desktop:
    name: Linux Desktop (Debian + Arch)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/client/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/client/src-tauri -> target

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm install --frozen-lockfile --prefer-offline

      - name: Build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm --filter stoat.js build
          pnpm --filter solid-livekit-components build
          pnpm --filter @lingui-solid/babel-plugin-lingui-macro build
          pnpm --filter @lingui-solid/babel-plugin-extract-messages build
          pnpm --filter client exec lingui compile --typescript

      - name: Build desktop app (Linux updater bundles)
        shell: bash
        run: |
          set -euxo pipefail
          pnpm --filter client exec node ./scripts/build-desktop.mjs linux-updater

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: packages/client/src-tauri/target/release/bundle/
          if-no-files-found: error

  flatpak:
    name: Flatpak (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-latest
          - arch: aarch64
            runs_on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            flatpak \
            flatpak-builder \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak runtime and SDK
        run: |
          flatpak install --user -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/client/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/client/src-tauri -> target

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm install --frozen-lockfile --prefer-offline

      - name: Build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm --filter stoat.js build
          pnpm --filter solid-livekit-components build
          pnpm --filter @lingui-solid/babel-plugin-lingui-macro build
          pnpm --filter @lingui-solid/babel-plugin-extract-messages build
          pnpm --filter client exec lingui compile --typescript

      - name: Build desktop binary for Flatpak
        shell: bash
        run: |
          set -euxo pipefail
          OTUBE_LINUX_FLAVOR=flatpak-${{ matrix.arch }} pnpm --filter client exec node ./scripts/build-desktop.mjs linux-nobundle

      - name: Compute Flatpak channel metadata
        id: flatpak_meta
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            CHANNEL="stable"
            if [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
              VERSION="${{ github.event.inputs.release_tag }}"
            else
              VERSION="v${GITHUB_RUN_NUMBER}"
            fi
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            CHANNEL="beta"
            VERSION="beta-${GITHUB_RUN_NUMBER}"
          else
            CHANNEL="nightly"
            VERSION="nightly-${GITHUB_RUN_NUMBER}-${GITHUB_SHA}"
          fi
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build Flatpak repository with Flatter
        id: flatter
        uses: andyholmes/flatter@v1.0.0
        with:
          files: |
            packaging/flatpak/com.chillboiostudios.dawnchat.yml
          arch: ${{ matrix.arch }}
          flatpak-builder-args: |
            --default-branch=${{ steps.flatpak_meta.outputs.channel }}
            --metadata=version=${{ steps.flatpak_meta.outputs.version }}

      - name: Build Flatpak bundle
        shell: bash
        run: |
          set -euxo pipefail
          flatpak build-bundle --arch=${{ matrix.arch }} --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo "${{ steps.flatter.outputs.repository }}" DawnChat-${{ matrix.arch }}.flatpak com.chillboiostudios.dawnchat ${{ steps.flatpak_meta.outputs.channel }}

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: com.chillboiostudios.dawnchat-${{ matrix.arch }}
          path: DawnChat-${{ matrix.arch }}.flatpak
          if-no-files-found: error

      - name: Upload Flatpak OSTree repo
        uses: actions/upload-artifact@v4
        with:
          name: desktop-flatpak-repo-${{ matrix.arch }}
          path: ${{ steps.flatter.outputs.repository }}/
          if-no-files-found: error

  publish-flatpak-remote:
    name: Publish Flatpak Remote
    runs-on: ubuntu-latest
    needs:
      - flatpak

    steps:
      - name: Install publishing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak ostree

      - name: Download Flatpak repo artifacts
        uses: actions/download-artifact@v5
        with:
          path: flatpak-repos
          pattern: desktop-flatpak-repo-*
          merge-multiple: false

      - name: Download Flatpak bundle artifacts
        uses: actions/download-artifact@v5
        with:
          path: flatpak-bundles
          pattern: com.chillboiostudios.dawnchat-*
          merge-multiple: false

      - name: Compute OTA version tag
        id: ota_meta
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            CHANNEL="stable"
            if [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
              VERSION="${{ github.event.inputs.release_tag }}"
            else
              VERSION="v${GITHUB_RUN_NUMBER}"
            fi
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            CHANNEL="beta"
            VERSION="beta-${GITHUB_RUN_NUMBER}"
          else
            CHANNEL="nightly"
            VERSION="nightly-${GITHUB_RUN_NUMBER}-${GITHUB_SHA}"
          fi
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Merge architecture repos and create app repo + metadata
        shell: bash
        run: |
          set -euxo pipefail

          CHANNEL="${{ steps.ota_meta.outputs.channel }}"
          APP_CHANNEL_PATH="${FLATPAK_OTA_APP_PATH}/${CHANNEL}"

          mkdir -p "public/${APP_CHANNEL_PATH}/repo"
          ostree --repo="public/${APP_CHANNEL_PATH}/repo" init --mode=archive-z2

          # Merge per-arch repos into a single multi-arch app repo
          while IFS= read -r repo_dir; do
            ostree --repo="public/${APP_CHANNEL_PATH}/repo" pull-local "${repo_dir}"
          done < <(find flatpak-repos -mindepth 2 -maxdepth 2 -type d -name repo | sort)

          # Generate summary, static deltas, and AppStream (for Discover)
          flatpak build-update-repo \
            --generate-static-deltas \
            --generate-appstream \
            --prune \
            "public/${APP_CHANNEL_PATH}/repo"

          REPO_URL="${FLATPAK_OTA_BASE_URL}/${APP_CHANNEL_PATH}/repo/"
          HOMEPAGE_URL="https://github.com/Chillboio-Studios/dawnchat-for-web"
          ICON_URL="${FLATPAK_OTA_BASE_URL}/${APP_CHANNEL_PATH}/icon.png"
          GPG_KEY_BASE64="${{ secrets.FLATPAK_REPO_GPG_KEY_BASE64 }}"

          mkdir -p "public/${APP_CHANNEL_PATH}"
          cp packages/client/src-tauri/icons/icon.png "public/${APP_CHANNEL_PATH}/icon.png"

          # x86_64 channel
          cat > "public/${APP_CHANNEL_PATH}/com.chillboiostudios.dawnchat.${CHANNEL}.flatpakref" <<EOF
          [Flatpak Ref]
          Name=app/com.chillboiostudios.dawnchat/x86_64/${CHANNEL}
          Branch=${CHANNEL}
          Title=DawnChat
          IsRuntime=false
          Url=${REPO_URL}
          RuntimeRepo=https://flathub.org/repo/flathub.flatpakrepo
          SuggestRemoteName=dawnchat
          Homepage=${HOMEPAGE_URL}
          Icon=${ICON_URL}
          EOF

          # aarch64 channel
          cat > "public/${APP_CHANNEL_PATH}/com.chillboiostudios.dawnchat.aarch64.${CHANNEL}.flatpakref" <<EOF
          [Flatpak Ref]
          Name=app/com.chillboiostudios.dawnchat/aarch64/${CHANNEL}
          Branch=${CHANNEL}
          Title=DawnChat
          IsRuntime=false
          Url=${REPO_URL}
          RuntimeRepo=https://flathub.org/repo/flathub.flatpakrepo
          SuggestRemoteName=dawnchat
          Homepage=${HOMEPAGE_URL}
          Icon=${ICON_URL}
          EOF

          if [ -n "${GPG_KEY_BASE64}" ]; then
            echo "GPGKey=${GPG_KEY_BASE64}" >> "public/${APP_CHANNEL_PATH}/com.chillboiostudios.dawnchat.${CHANNEL}.flatpakref"
            echo "NoGPGVerify=false" >> "public/${APP_CHANNEL_PATH}/com.chillboiostudios.dawnchat.aarch64.${CHANNEL}.flatpakref"
            echo "GPGKey=${GPG_KEY_BASE64}" >> "public/${APP_CHANNEL_PATH}/com.chillboiostudios.dawnchat.aarch64.${CHANNEL}.flatpakref"
            echo "NoGPGVerify=false" >> "public/${APP_CHANNEL_PATH}/com.chillboiostudios.dawnchat.${CHANNEL}.flatpakref"
          else
            echo "NoGPGVerify=true" >> "public/${APP_CHANNEL_PATH}/com.chillboiostudios.dawnchat.${CHANNEL}.flatpakref"
            echo "NoGPGVerify=true" >> "public/${APP_CHANNEL_PATH}/com.chillboiostudios.dawnchat.aarch64.${CHANNEL}.flatpakref"
          fi

          mkdir -p "public/${APP_CHANNEL_PATH}/bundles"
          while IFS= read -r bundle_file; do
            cp "${bundle_file}" "public/${APP_CHANNEL_PATH}/bundles/"
          done < <(find flatpak-bundles -type f -name '*.flatpak' | sort)

      - name: Upload Flatpak remote artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-flatpak-remote
          path: public/${{ env.FLATPAK_OTA_APP_PATH }}/
          if-no-files-found: error

      - name: Publish Flatpak OTA to external repository
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref_name == github.event.repository.default_branch || github.ref_name == 'master'
        shell: bash
        env:
          OTA_REPO_TOKEN: ${{ secrets.FLATPAK_OTA_REPO_TOKEN }}
          OTA_VERSION_TAG: ${{ steps.ota_meta.outputs.version }}
        run: |
          set -euxo pipefail

          if [ -z "${OTA_REPO_TOKEN}" ]; then
            echo "FLATPAK_OTA_REPO_TOKEN is required to publish OTA content."
            exit 1
          fi

          git clone --depth=1 "https://x-access-token:${OTA_REPO_TOKEN}@github.com/${FLATPAK_OTA_REPOSITORY}.git" ota-repo
          cd ota-repo

          target_branch=""
          if git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            target_branch="main"
          elif git ls-remote --exit-code --heads origin master >/dev/null 2>&1; then
            target_branch="master"
          fi

          if [ -n "${target_branch}" ]; then
            git fetch origin "${target_branch}"
            git checkout -B "${target_branch}" FETCH_HEAD
          else
            target_branch="main"
            git checkout --orphan "${target_branch}"
            git rm -rf . || true
          fi

          mkdir -p "${FLATPAK_OTA_APP_PATH}"
          rsync -a --delete "../public/${FLATPAK_OTA_APP_PATH}/" "${FLATPAK_OTA_APP_PATH}/"

          if [ ! -f CNAME ]; then
            echo "flatpak-ota.chillboiostudios.com" > CNAME
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            rsync -a --delete "../public/${FLATPAK_OTA_APP_PATH}/" "${FLATPAK_OTA_APP_PATH}/"
            git add "${FLATPAK_OTA_APP_PATH}" CNAME

            if git diff --cached --quiet; then
              echo "No OTA content changes to publish."
              exit 0
            fi

            git commit -m "dawnchat ota ${OTA_VERSION_TAG}"
            if git push origin "${target_branch}"; then
              break
            fi

            if [ "${attempt}" -eq 5 ]; then
              echo "Failed to push ${target_branch} after 5 attempts." >&2
              exit 1
            fi

            echo "Push rejected (non-fast-forward). Retrying with latest ${target_branch}."
            git fetch origin "${target_branch}"
            git reset --hard "origin/${target_branch}"
          done

          tag_name="dawnchat-${OTA_VERSION_TAG}"
          git tag -f "${tag_name}"
          git push origin "${tag_name}" --force

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux-desktop
      - flatpak
      - publish-flatpak-remote

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Compute release metadata
        id: meta
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            CHANNEL="stable"
            if [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
              VERSION="${{ github.event.inputs.release_tag }}"
            else
              VERSION="v${GITHUB_RUN_NUMBER}"
            fi
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            CHANNEL="beta"
            VERSION="beta-${GITHUB_RUN_NUMBER}"
          else
            CHANNEL="nightly"
            VERSION="nightly-${GITHUB_RUN_NUMBER}-${GITHUB_SHA}"
          fi

          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${CHANNEL}" == "stable" ]]; then
            echo "name=DawnChat ${VERSION}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "${CHANNEL}" == "beta" ]]; then
            echo "name=DawnChat Beta ${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "name=DawnChat Nightly ${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build multi-platform updater package
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p updater-package

          while IFS= read -r updater_file; do
            rsync -a --relative "${updater_file}" updater-package/
          done < <(find release-assets -type f \( \
            -name 'latest*.json' -o \
            -name '*.sig' -o \
            -name '*.AppImage' -o \
            -name '*.AppImage.tar.gz' -o \
            -name '*.deb' -o \
            -name 'DawnChat*.exe' -o \
            -name 'DawnChat*.msi' \
          \) | sort)

          (cd updater-package && zip -r ../DawnChat-updater-multi-platform.zip .)

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-assets/**/DawnChat*.exe
            release-assets/**/DawnChat*.msi
            release-assets/**/*.deb
            release-assets/**/*.AppImage
            release-assets/**/*.AppImage.tar.gz
            release-assets/**/latest*.json
            release-assets/**/*.sig
            release-assets/**/DawnChat*.flatpak
            release-assets/**/com.chillboiostudios*.flatpak
            release-assets/**/com.chillboiostudios.dawnchat*.flatpakref
            DawnChat-updater-multi-platform.zip
