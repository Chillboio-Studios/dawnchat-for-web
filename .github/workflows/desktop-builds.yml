name: Desktop Builds

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Stable release tag to publish (for example: v1.0.0)"
        required: false
        type: string
  push:
    branches:
      - "**"

permissions:
  contents: write

env:
  TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  APP_API_URL: https://app.dawn-chat.com/api
  APP_CLIENT_API_URL: https://app.dawn-chat.com/client-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        shell: pwsh
        run: |
          pnpm --filter stoat.js build
          pnpm --filter solid-livekit-components build
          pnpm --filter @lingui-solid/babel-plugin-lingui-macro build
          pnpm --filter @lingui-solid/babel-plugin-extract-messages build
          pnpm --filter client exec lingui compile --typescript

      - name: Build desktop app (Windows)
        shell: pwsh
        run: pnpm build-windows

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: packages/client/src-tauri/target/release/bundle/
          if-no-files-found: error

  linux-debian:
    name: Linux-Debian
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm install --frozen-lockfile

      - name: Build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm --filter stoat.js build
          pnpm --filter solid-livekit-components build
          pnpm --filter @lingui-solid/babel-plugin-lingui-macro build
          pnpm --filter @lingui-solid/babel-plugin-extract-messages build
          pnpm --filter client exec lingui compile --typescript

      - name: Build desktop app (Debian)
        shell: bash
        run: |
          set -euxo pipefail
          OTUBE_LINUX_FLAVOR=debian pnpm build-linux

      - name: Upload Debian bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-debian
          path: packages/client/src-tauri/target/release/bundle/
          if-no-files-found: error

  linux-arch:
    name: Linux-Arch
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install base dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            curl \
            file \
            git \
            gtk3 \
            libayatana-appindicator \
            xdotool \
            make \
            nodejs \
            npm \
            openssl \
            pkgconf \
            rustup \
            webkit2gtk-4.1 \
            zip
          rustup default stable
          npm install -g pnpm@10.10.0

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm install --frozen-lockfile

      - name: Build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm --filter stoat.js build
          pnpm --filter solid-livekit-components build
          pnpm --filter @lingui-solid/babel-plugin-lingui-macro build
          pnpm --filter @lingui-solid/babel-plugin-extract-messages build
          pnpm --filter client exec lingui compile --typescript

      - name: Build desktop app (Arch binary)
        shell: bash
        run: |
          set -euxo pipefail
          OTUBE_LINUX_FLAVOR=arch pnpm --filter client exec node ./scripts/build-desktop.mjs linux-nobundle

      - name: Upload Arch build output
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-arch
          path: |
            packages/client/src-tauri/target/release/dawnchat_desktop
            packages/client/src-tauri/target/release/bundle/

  linux-other:
    name: Linux-Other (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: fedora
            image: fedora:40
            install: |
              dnf install -y \
                gcc-c++ \
                git \
                glib2-devel \
                gtk3-devel \
                libappindicator-gtk3-devel \
                libstdc++-static \
                make \
                curl \
                nodejs \
                npm \
                openssl-devel \
                pkg-config \
                webkit2gtk4.1-devel
          - distro: opensuse
            image: opensuse/tumbleweed:latest
            install: |
              zypper --non-interactive refresh
              zypper --non-interactive install \
                gcc-c++ \
                git \
                gtk3-devel \
                libappindicator3-devel \
                make \
                curl \
                nodejs \
                npm \
                openssl-devel \
                pkg-config \
                webkit2gtk3-devel
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install distro dependencies
        shell: bash
        run: |
          set -euxo pipefail
          ${{ matrix.install }}
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          npm install -g pnpm@10.10.0

      - name: Checkout (manual git clone)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          rm -rf "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm install --frozen-lockfile

      - name: Build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm --filter stoat.js build
          pnpm --filter solid-livekit-components build
          pnpm --filter @lingui-solid/babel-plugin-lingui-macro build
          pnpm --filter @lingui-solid/babel-plugin-extract-messages build
          pnpm --filter client exec lingui compile --typescript

      - name: Build desktop app (other Linux binary)
        shell: bash
        run: |
          set -euxo pipefail
          OTUBE_LINUX_FLAVOR=${{ matrix.distro }} pnpm --filter client exec node ./scripts/build-desktop.mjs linux-nobundle

      - name: Upload other Linux build output
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-${{ matrix.distro }}
          path: packages/client/src-tauri/target/release/dawnchat_desktop
          if-no-files-found: error

  flatpak:
    name: Flatpak
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            flatpak \
            flatpak-builder \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm install --frozen-lockfile

      - name: Build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pnpm --filter stoat.js build
          pnpm --filter solid-livekit-components build
          pnpm --filter @lingui-solid/babel-plugin-lingui-macro build
          pnpm --filter @lingui-solid/babel-plugin-extract-messages build
          pnpm --filter client exec lingui compile --typescript

      - name: Build desktop binary for Flatpak
        shell: bash
        run: |
          set -euxo pipefail
          OTUBE_LINUX_FLAVOR=flatpak pnpm --filter client exec node ./scripts/build-desktop.mjs linux-nobundle

      - name: Build Flatpak bundle
        shell: bash
        run: |
          set -euxo pipefail
          flatpak-builder --force-clean --repo=repo flatpak-build-dir packaging/flatpak/com.chillboiostudios.dawnchat.yml
          flatpak build-bundle repo DawnChat.flatpak com.chillboiostudios.dawnchat

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: desktop-flatpak
          path: DawnChat.flatpak
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux-debian
      - linux-arch
      - linux-other
      - flatpak

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Compute release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=beta-${{ github.run_number }}-${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "name=DawnChat Beta ${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            input_tag="${{ github.event.inputs.release_tag }}"
            if [ -z "$input_tag" ]; then
              input_tag="v${{ github.run_number }}"
            fi
            echo "tag=$input_tag" >> "$GITHUB_OUTPUT"
            echo "name=DawnChat $input_tag" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-assets/**/*
